<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

<div class="bg-white p-8 rounded shadow-md w-full max-w-md">
    <h2 class="text-2xl font-bold mb-6 text-center">Create Account</h2>

    <form method="post" action="/register" class="space-y-4">
        <div>
            <label class="block mb-1 font-medium">Username</label>
            <input type="text" name="username" required class="w-full border px-4 py-2 rounded"/>
        </div>
        <div>
            <label class="block mb-1 font-medium">Email</label>
            <input type="email" name="email" required class="w-full border px-4 py-2 rounded"/>
        </div>
        <div>
            <label class="block mb-1 font-medium">Password</label>
            <input type="password" name="password" required class="w-full border px-4 py-2 rounded"/>
        </div>
        <button type="submit" class="w-full bg-blue-500 text-white py-2 rounded hover:bg-blue-600">Register</button>
    </form>
</div>

</body>
</html>
