<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<tr th:fragment="row(application)" th:id="${'application-row-' + application.id}" class="align-top">
    <td class="px-4 py-4">
        <p class="font-semibold text-white" th:text="${application.companyName}"></p>
        <p class="mt-1 text-slate-400" th:text="${application.jobLocation + ' | ' + application.workMode}"></p>
        <a th:if="${application.applicationLink != null and !#strings.isEmpty(application.applicationLink)}"
           th:href="${application.applicationLink}"
           target="_blank"
           class="mt-2 inline-block text-teal-300 hover:text-teal-200">View listing</a>
    </td>
    <td class="px-4 py-4">
        <p class="font-medium text-slate-100" th:text="${application.roleTitle}"></p>
        <p class="mt-1 text-slate-400" th:text="${'Applied: ' + application.appliedOn}"></p>
        <p class="mt-1 text-slate-400" th:text="${application.interviewDate != null ? 'Interview: ' + application.interviewDate : 'Interview not scheduled'}"></p>
        <p class="mt-1 text-slate-400" th:text="${application.followUpDate != null ? 'Follow-up: ' + application.followUpDate : 'Follow-up not planned'}"></p>
        <p class="mt-1 text-slate-400" th:text="${'Milestone: ' + application.nextMilestone}"></p>
        <p class="mt-2 text-slate-300" th:text="${application.prepFocus}"></p>
    </td>
    <td class="px-4 py-4">
        <div class="flex items-center gap-3">
            <div class="h-2 w-24 overflow-hidden rounded-full bg-white/10">
                <div class="h-full rounded-full bg-gradient-to-r from-teal-300 via-cyan-300 to-amber-300" th:style="${'width:' + application.readinessScore + '%'}"></div>
            </div>
            <span class="font-semibold text-white" th:text="${application.readinessScore + '%'}"></span>
        </div>
        <p class="mt-2 text-slate-400" th:text="${application.priority + ' priority'}"></p>
        <p class="mt-1 text-slate-400" th:text="${application.compensationRange}"></p>
        <p class="mt-1 text-slate-400" th:text="${'Resume: ' + application.resumeVersion}"></p>
        <p class="mt-1 text-slate-400" th:text="${application.mockInterviewScore != null ? 'Mock: ' + application.mockInterviewScore + '/100' : 'Mock: not recorded'}"></p>
        <p class="mt-1 text-slate-400" th:text="${'Confidence: ' + application.confidenceLevel + ' | ' + application.prepIntensity}"></p>
        <p class="mt-2 text-xs text-slate-500" th:text="${'Updated: ' + application.updatedOn}"></p>
    </td>
    <td class="px-4 py-4">
        <form th:action="@{/applications/{id}/stage(id=${application.id})}"
              method="post"
              hx-swap="outerHTML"
              th:attr="hx-post=@{/applications/{id}/stage(id=${application.id})},hx-target=${'#application-row-' + application.id}"
              class="space-y-3">
            <select name="status" class="w-full rounded-2xl border border-white/10 bg-slate-900 px-3 py-2 text-white outline-none transition focus:border-teal-300">
                <option value="Applied" th:selected="${application.status == 'Applied'}">Applied</option>
                <option value="Assessment" th:selected="${application.status == 'Assessment'}">Assessment</option>
                <option value="Interview Scheduled" th:selected="${application.status == 'Interview Scheduled'}">Interview Scheduled</option>
                <option value="Interviewing" th:selected="${application.status == 'Interviewing'}">Interviewing</option>
                <option value="HR Round" th:selected="${application.status == 'HR Round'}">HR Round</option>
                <option value="Offer" th:selected="${application.status == 'Offer'}">Offer</option>
                <option value="Rejected" th:selected="${application.status == 'Rejected'}">Rejected</option>
            </select>
            <button type="submit" class="rounded-full bg-white/10 px-4 py-2 font-medium text-white transition hover:bg-white/15">Quick update</button>
        </form>
        <p class="mt-3 rounded-full bg-amber-300/15 px-3 py-1 text-center text-xs font-medium text-amber-200" th:text="${application.status}"></p>
    </td>
    <td class="px-4 py-4">
        <p class="rounded-2xl border border-white/10 bg-slate-950/40 p-3 text-sm text-slate-300" th:text="${application.suggestedNextAction}"></p>
        <p th:if="${application.recruiterName != null and !#strings.isEmpty(application.recruiterName)}" class="mt-3 text-sm text-slate-400" th:text="${'Recruiter: ' + application.recruiterName + (application.recruiterEmail != null and !#strings.isEmpty(application.recruiterEmail) ? ' | ' + application.recruiterEmail : '')}"></p>
        <p class="mt-3 rounded-2xl border border-cyan-300/15 bg-cyan-300/10 p-3 text-xs text-cyan-100" th:text="${application.recruiterMessageDraft}"></p>
        <p th:if="${application.followUpDue}" class="mt-3 rounded-full bg-rose-400/15 px-3 py-1 text-center text-xs font-medium text-rose-200">Follow-up due</p>
        <div class="mt-4 flex flex-wrap gap-2">
            <a th:href="@{/applications/{id}/edit(id=${application.id})}" class="rounded-full border border-cyan-300/30 px-4 py-2 text-cyan-200 transition hover:bg-cyan-300/10">Edit</a>
            <form th:action="@{/applications/{id}/send-reminder(id=${application.id})}" method="post">
                <button type="submit" class="rounded-full border border-amber-300/30 px-4 py-2 text-amber-100 transition hover:bg-amber-300/10">Send reminder</button>
            </form>
        </div>
        <form th:action="@{/applications/delete}" method="post" class="mt-3">
            <input type="hidden" name="reservationId" th:value="${application.id}">
            <button type="submit" class="rounded-full border border-rose-400/40 px-4 py-2 text-rose-200 transition hover:bg-rose-400/10">Remove</button>
        </form>
    </td>
</tr>
</body>
</html>
