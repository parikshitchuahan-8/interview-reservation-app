<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Remove Application</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">

<div class="bg-white p-8 rounded shadow-md w-full max-w-md">
    <h2 class="text-2xl font-bold mb-4 text-center text-red-600">Remove Application</h2>

    <form th:action="@{/applications/delete}" method="post" class="space-y-4">
        <div>
            <label for="reservationId" class="block text-gray-700">Reservation ID</label>
            <input type="text" id="reservationId" name="reservationId" required
                   class="w-full px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-red-500">
        </div>

        <button type="submit"
                class="w-full bg-red-500 text-white py-2 rounded hover:bg-red-600 transition duration-200">
            Remove Application
        </button>
    </form>

    <div th:if="${message}" class="mt-4 text-green-600 text-center">
        <p th:text="${message}"></p>
    </div>

    <div class="mt-4 text-center">
        <a href="/dashboard" class="text-blue-500 hover:underline">Back to Dashboard</a>
    </div>
</div>

</body>
</html>
